<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收作业系统 · 教师管理 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh}
.topbar{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:18px;font-weight:600}
.topbar .user{font-size:13px;opacity:.8;cursor:pointer}
.container{max-width:960px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:2px;background:#fff;border-radius:12px 12px 0 0;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tab{flex:1;padding:14px;text-align:center;cursor:pointer;font-size:14px;font-weight:500;color:#666;border-bottom:3px solid transparent;transition:all .2s}
.tab:hover{background:#f8f9fa}
.tab.active{color:#1a1a2e;border-bottom-color:#1a1a2e;background:#f8f9fa}
.panel{background:#fff;padding:24px;border-radius:0 0 12px 12px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:none}
.panel.active{display:block}
/* Login */
.login-card{max-width:380px;margin:80px auto;background:#fff;padding:32px;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.1);text-align:center}
.login-card h2{font-size:20px;margin-bottom:6px}
.login-card p{color:#888;font-size:13px;margin-bottom:20px}
.login-card input{width:100%;padding:12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;outline:none;margin-bottom:14px}
.login-card input:focus{border-color:#1a1a2e}
/* Buttons */
.btn{padding:10px 20px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-dark{background:#1a1a2e;color:#fff}
.btn-dark:hover{opacity:.9}
.btn-info{background:#3498db;color:#fff}
.btn-info:hover{background:#2980b9}
.btn-success{background:#27ae60;color:#fff}
.btn-danger{background:#e74c3c;color:#fff;padding:6px 12px;font-size:12px}
.btn-danger:hover{background:#c0392b}
.btn-outline{background:#fff;color:#1a1a2e;border:1.5px solid #e0e0e0}
.btn-outline:hover{background:#f0f0f0}
.btn-sm{padding:6px 12px;font-size:12px}
/* Forms */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#333;margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:#1a1a2e}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row .form-group{flex:1}
/* Table */
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
th,td{text-align:left;padding:10px 8px;border-bottom:1px solid #eee}
th{color:#888;font-weight:600;font-size:12px;text-transform:uppercase;white-space:nowrap}
tr:hover{background:#f8f9fa}
/* Stats */
.stats{display:flex;gap:16px;margin-bottom:20px}
.stat{flex:1;background:#f8f9fa;border-radius:10px;padding:16px;text-align:center}
.stat .num{font-size:28px;font-weight:700;color:#1a1a2e}
.stat .label{font-size:12px;color:#888;margin-top:4px}
/* Messages */
.msg-list{max-height:400px;overflow-y:auto;margin-top:12px}
.msg{border-bottom:1px solid #f0f0f0;padding:10px 0;display:flex;gap:10px}
.msg .avatar{width:36px;height:36px;border-radius:50%;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg .body{flex:1}
.msg .author{font-weight:600;font-size:13px}
.msg .author .time{font-weight:400;color:#999;font-size:11px;margin-left:8px}
.msg .text{font-size:13px;color:#333;margin-top:4px}
.msg .del-btn{font-size:11px;color:#e74c3c;cursor:pointer;background:none;border:none;padding:2px 6px;align-self:flex-start;margin-top:4px}
.msg .del-btn:hover{background:#fef0f0;border-radius:4px}
/* File list */
.file-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.file-row .icon{font-size:20px;width:30px;text-align:center}
.file-row .fname{flex:1;font-size:13px}
.file-row .fsize{font-size:12px;color:#888;white-space:nowrap}
.file-row .ftime{font-size:11px;color:#aaa;white-space:nowrap}
/* Search */
.search-box{padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;width:100%;margin-bottom:14px;outline:none}
.search-box:focus{border-color:#1a1a2e}
/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;color:#fff;font-size:14px;z-index:999;display:none}
.toast.success{background:#27ae60}
.toast.error{background:#e74c3c}
.toast.show{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
/* Modal */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:14px;padding:24px;width:90%;max-width:400px}
.modal-content h3{font-size:16px;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-active{background:#e8f5e9;color:#27ae60}
.badge-disabled{background:#fde8e8;color:#e74c3c}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar .spacer{flex:1}
#loginView{display:block}
#mainView{display:none}
.hidden{display:none!important}
.loading{text-align:center;padding:20px;color:#888}
</style>

</div>

</div></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

</div></div>

<div class="modal" id="editModal">
<div class="modal-content">

</div>
</div></div>

// ═══ SHA256 ═══
async function s256(m){const b=new TextEncoder().encode(m);const h=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');}

// ═══ API 调用 ═══
async function api(path,body,token){
 token=token||adminToken;
 const hdrs={'Content-Type':'application/json'};
 if(token)hdrs['Authorization']='Bearer '+token;
 const r=await fetch(API+path,{method:'POST',headers:hdrs,body:JSON.stringify(body)});
 return r.json();
}

// ═══ Toast ═══

 t.textContent=msg;t.className='toast '+type+' show';
 setTimeout(()=>t.classList.remove('show'),2500);
}

  document.getElementById('mainView').classList.remove('hidden');
  await loadAccounts();
  return;
 }

 // 试云端
 try{
  const r=await api('/api/admin/login',{password:pw},null);
  if(r.success){adminToken=r.token;showMain();return;}
  err.textContent=r.error||'密码错误';err.style.display='block';
 }catch(e){
  err.textContent='登录失败，请检查网络';err.style.display='block';
 }
}
function showMain(){
 document.getElementById('loginView').style.display='none';

  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById(t.dataset.panel).classList.add('active');
  currentTab=t.dataset.panel;
 });
});

// ═══ 加载账号 ═══
async function loadAccounts(){
 try{
  const r=await api('/api/admin/accounts',{action:'list'});
  if(r && Object.keys(r).length>0){
   // API返回的是{studentId:{id,name,passwordHash,enabled}}
   const students=[];
   for(const [id,s] of Object.entries(r)){
    students.push({id,name:s.name,passwordHash:s.passwordHash,enabled:s.enabled!==false});
   }
   accounts={students};
  }
 }catch(e){console.log('云端加载失败，使用内嵌数据');}
 if(!accounts&&EMBEDDED)accounts=EMBEDDED;
 if(!accounts)accounts={students:[]};
 renderStudents();
 updateStats();
}
async function saveAccounts(){
 try{
  await api('/api/admin/accounts',{action:'save',accounts});
  toast('账号已保存','success');
 }catch(e){toast('保存失败: '+e.message,'error');}
}
function updateStats(){
 const s=accounts.students||[];
 document.getElementById('statTotal').textContent=s.length;
 document.getElementById('statActive').textContent=s.filter(x=>x.enabled!==false).length;
 document.getElementById('statDisabled').textContent=s.filter(x=>x.enabled===false).length;
}
function renderStudents(){
 const q=(document.getElementById('searchStudent')?.value||'').toLowerCase();
 const s=(accounts.students||[]).filter(x=>!q||x.id.toLowerCase().includes(q)||x.name.includes(q));
 const el=document.getElementById('studentList');
 el.innerHTML='<table><thead><tr><th>学号</th><th>姓名</th><th>状态</th><th>操作</th></tr></thead><tbody>'+
  s.map(x=>`<tr>
   <td>${x.id}</td><td>${x.name}</td>
   <td><span class="badge ${x.enabled!==false?'badge-active':'badge-disabled'}">${x.enabled!==false?'已启用':'已禁用'}</span></td>
   <td>
    <button class="btn btn-info btn-sm" onclick="showEdit('${x.id}')">编辑</button>
    <button class="btn btn-outline btn-sm" onclick="toggleStudent('${x.id}')">${x.enabled!==false?'禁用':'启用'}</button>
    <button class="btn btn-danger btn-sm" onclick="delStudent('${x.id}')">删除</button>
   </td></tr>`).join('')+
  '</tbody></table>';
}
function showAddStudent(){
 document.getElementById('addId').value='';document.getElementById('addName').value='';
 document.getElementById('addPwd').value='123456';
 document.getElementById('addModal').classList.add('show');
}
function hideAddModal(){document.getElementById('addModal').classList.remove('show');}
async function addStudent(){
 const id=document.getElementById('addId').value.trim();
 const name=document.getElementById('addName').value.trim();
 const pwd=document.getElementById('addPwd').value||'123456';
 if(!id||!name){toast('请填写学号和姓名','error');return;}
 if(accounts.students.find(s=>s.id===id)){toast('学号已存在','error');return;}
 accounts.students.push({id,name,passwordHash:await s256(pwd),enabled:true});
 hideAddModal();
 await saveAccounts();
 renderStudents();updateStats();
 toast('添加成功','success');
}
function showEdit(id){
 const s=accounts.students.find(x=>x.id===id);
 if(!s)return;
 document.getElementById('editOrigId').value=id;
 document.getElementById('editId').value=id;
 document.getElementById('editName').value=s.name;
 document.getElementById('editPwd').value='';
 document.getElementById('editModal').classList.add('show');
}
function hideEditModal(){document.getElementById('editModal').classList.remove('show');}
async function saveEdit(){
 const origId=document.getElementById('editOrigId').value;
 const newId=document.getElementById('editId').value.trim();
 const name=document.getElementById('editName').value.trim();
 const pwd=document.getElementById('editPwd').value;
 const s=accounts.students.find(x=>x.id===origId);
 if(!s)return;
 if(newId!==origId&&accounts.students.find(x=>x.id===newId)){toast('新学号已存在','error');return;}
 s.id=newId;s.name=name;
 if(pwd)s.passwordHash=await s256(pwd);
 hideEditModal();
 await saveAccounts();
 renderStudents();
 toast('修改成功','success');
}
async function toggleStudent(id){
 const s=accounts.students.find(x=>x.id===id);
 if(!s)return;
 s.enabled=s.enabled===false?true:false;
 await saveAccounts();
 renderStudents();updateStats();
}
async function delStudent(id){
 if(!confirm('确认删除学生 '+id+'?'))return;
 accounts.students=accounts.students.filter(x=>x.id!==id);
 await saveAccounts();
 renderStudents();updateStats();
}

// ═══ 文件浏览 ═══
async function loadFiles(){
 const batch=document.getElementById('fileBatch').value.trim();
 const sid=document.getElementById('fileStudent').value.trim();
 const el=document.getElementById('fileListContainer');
 if(!batch){el.innerHTML='<div class="loading">输入批次名称查询</div>';return;}
 el.innerHTML='<div class="loading">加载中...</div>';
 try{
  const r=await api('/api/admin/files',{batch,studentId:sid||undefined});
  document.getElementById('fileCount').textContent=r.files?r.files.length+' 个文件':'0 个文件';
  if(!r.files||r.files.length===0){el.innerHTML='<div class="loading">没有找到文件</div>';return;}
  const cosBase='https://homework-1321671019.cos.ap-guangzhou.myqcloud.com/';
  el.innerHTML=r.files.map(f=>{
   const ext=(f.key.split('.').pop()||'').toLowerCase();
   const icon={'jpg':'🖼','jpeg':'🖼','png':'🖼','gif':'🖼','mp4':'🎬','mov':'🎬','zip':'📦','rar':'📦','pdf':'📄','doc':'📝','docx':'📝','xls':'📊','xlsx':'📊','ppt':'📽'}[ext]||'📎';
   const size=f.size<1024*1024?(f.size/1024).toFixed(0)+'KB':(f.size/(1024*1024)).toFixed(1)+'MB';
   return `<div class="file-row">
    <span class="icon">${icon}</span>
    <span class="fname"><a href="${cosBase+encodeURI(f.key)}" download target="_blank">${f.key.split('/').pop()}</a></span>
    <span class="fsize">${size}</span>
    <span class="ftime">${f.time}</span>
   </div>`;
  }).join('');
 }catch(e){el.innerHTML='<div class="loading">加载失败: '+e.message+'</div>';}
}

// ═══ 聊天管理 ═══
async function loadChat(){
 const batch=document.getElementById('chatBatch').value.trim();
 const el=document.getElementById('chatList');
 if(!batch){el.innerHTML='<div class="loading">输入批次名称加载消息</div>';return;}
 el.innerHTML='<div class="loading">加载中...</div>';
 try{
  const r=await api('/api/admin/messages',{action:'list',batch});
  document.getElementById('chatCount').textContent=r.messages?r.messages.length+' 条消息':'0 条';
  if(!r.messages||r.messages.length===0){el.innerHTML='<div class="loading">暂无消息</div>';return;}
  el.innerHTML='<div class="msg-list">'+r.messages.map(m=>`
   <div class="msg">
    <div class="avatar">${(m.name||'?')[0]}</div>
    <div class="body">
     <div class="author">${m.name||'?'} (${m.sid||''})<span class="time">${new Date(m.time*1000).toLocaleString('zh-CN')}</span></div>
     <div class="text">${esc(m.text)}</div>
    </div>
    <button class="del-btn" onclick="delMsg('${batch}','${m.id}')">删除</button>
   </div>`).join('')+'</div>';
 }catch(e){el.innerHTML='<div class="loading">加载失败: '+e.message+'</div>';}
}
async function delMsg(batch,msgId){
 if(!confirm('确认删除这条消息?'))return;
 try{
  await api('/api/admin/messages',{action:'delete',batch,messageId:msgId});
  toast('消息已删除','success');
  loadChat();
 }catch(e){toast('删除失败','error');}
}
async function clearChat(){
 const batch=document.getElementById('chatBatch').value.trim();
 if(!batch)return;
 if(!confirm('确认清空批次 '+batch+' 的所有消息?'))return;
 try{
  await api('/api/admin/messages',{action:'clear',batch});
  toast('已清空','success');
  loadChat();
 }catch(e){toast('清空失败','error');}
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ═══ 发布 ═══
async function deploy(){
 const el=document.getElementById('deployStatus');
 el.style.color='#666';el.textContent='保存中...';
 try{
  await saveAccounts();
  el.style.color='#27ae60';el.textContent='✅ 发布完成！账号数据已同步到云端';
 }catch(e){el.style.color='#e74c3c';el.textContent='❌ '+e.message;}
}
